name: Update Streak Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch streak stats SVG
        run: |
          # We use the faster demolab instance rather than the Heroku one to ensure reliability
          curl -o streak.svg "https://streak-stats.demolab.com/?user=mrudula211&theme=tokyonight&hide_border=true&background=0d1117&ring=38bdf8&fire=8b5cf6&currStreakLabel=38bdf8"
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add streak.svg
          git commit -m "chore: auto-update streak stats [skip ci]" || echo "No changes to commit"
          git push
